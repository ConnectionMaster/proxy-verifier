meta:
  version: "1.0"
sessions:
- protocol:
    stack: http
  transactions:
  - client-request:
      method: GET
      url: /expected/origin
      version: "1.1"
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, present-http1-1 ]
    proxy-request:
      expect: present
    server-response:
      status: 200
      reason: OK
    proxy-response:
      status: 200
      reason: OK
