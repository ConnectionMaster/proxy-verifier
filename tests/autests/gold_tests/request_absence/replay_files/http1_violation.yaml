meta:
  version: "1.0"
sessions:
- protocol:
    stack: http
  transactions:
  - client-request:
      method: GET
      url: /unexpected/origin
      version: "1.1"
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, absent-http1-1 ]
    proxy-request:
      expect: absent
    proxy-response:
      status: 404
      reason: Not Found
