meta:
  version: "1.0"
sessions:
- protocol:
    stack: http
  transactions:
  - client-request:
      method: GET
      url: /missing/server-response
      version: "1.1"
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, missing-server-response-1 ]
    proxy-request:
      headers:
        fields:
        - [ uuid, { value: missing-server-response-1, as: equal } ]
