meta:
  version: "1.0"
sessions:
- protocol:
    stack: http
  transactions:
  - client-request:
      method: GET
      url: /cached/unspecified
      version: "1.1"
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, unspecified-cache-hit-1 ]
        - [ X-Proxy-Directive, "LocalResponse=%<200%>" ]
    server-response:
      status: 200
      reason: OK
    proxy-response:
      status: 200
      reason: OK
