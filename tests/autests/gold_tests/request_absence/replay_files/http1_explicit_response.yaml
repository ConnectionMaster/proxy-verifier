meta:
  version: "1.0"
sessions:
- protocol:
    stack: http
  transactions:
  - client-request:
      method: GET
      url: /unexpected/explicit-response
      version: "1.1"
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, absent-http1-explicit ]
    proxy-request:
      expect: absent
    server-response:
      status: 418
      reason: "I'm a teapot"
    proxy-response:
      status: 418
      reason: "I'm a teapot"
