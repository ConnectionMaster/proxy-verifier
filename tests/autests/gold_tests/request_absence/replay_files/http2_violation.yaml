meta:
  version: "1.0"
sessions:
- protocol:
    stack: http2
    tls:
      sni: test_sni
  transactions:
  - client-request:
      headers:
        fields:
        - [ :method, GET ]
        - [ :scheme, https ]
        - [ :authority, example.com ]
        - [ :path, /unexpected/http2 ]
        - [ uuid, absent-http2-1 ]
    proxy-request:
      expect: absent
    proxy-response:
      headers:
        fields:
        - [ :status, { value: 404, as: equal } ]
